---
name: "Collection Tests"

concurrency:
  group: ${{ github.head_ref || github.run_id }}-tests
  cancel-in-progress: true

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build-import:
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main
  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@main
  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@main
    with:
      extra_matrix_entries: >-
        [{"name":"sanity-py3.11-2.16","python":"3.11"},
         {"name":"sanity-py3.12-2.16","python":"3.12"},
         {"name":"sanity-py3.11-2.18","python":"3.11"},
         {"name":"sanity-py3.12-2.18","python":"3.12"},
         {"name":"sanity-py3.13-2.18","python":"3.13"}]
  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@main
    with:
      extra_matrix_entries: >-
        [{"name":"unit-py3.11-2.16","python":"3.11"},
         {"name":"unit-py3.12-2.16","python":"3.12"},
         {"name":"unit-py3.11-2.18","python":"3.11"},
         {"name":"unit-py3.12-2.18","python":"3.12"},
         {"name":"unit-py3.13-2.18","python":"3.13"}]
  all_green:
    if: ${{ always() }}
    needs:
      - build-import
      - sanity
      - unit-galaxy
      - ansible-lint
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert 'failure' not in
          set([
          '${{ needs.build-import.result }}',
          '${{ needs.sanity.result }}',
          '${{ needs.unit-galaxy.result }}',
          '${{ needs.ansible-lint.result }}',
          ])"
