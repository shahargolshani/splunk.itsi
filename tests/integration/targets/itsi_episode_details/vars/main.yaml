---
# Pre-existing episode _key (from the ITSI KV store), keyed by inventory hostname.
# Each server fixture has its own stable episode that is guaranteed to exist.
test_episode_id_map:
  "splunk-itsi-9.4": "84cb0211-6235-4058-acfc-80780649c6b8"
  "splunk-itsi-10.4": "728a5acd-a460-4b6b-9e44-1a0a56f24566"

test_episode_id: "{{ test_episode_id_map[inventory_hostname] }}"

# First update payload -- applied during check-mode, update, and idempotency tests
test_episode_update:
  severity: "4"
  status: "2"
  owner: "unassigned"
  instruction: "Testing the itsi_update_episode_details module"

# Second update payload -- proves the module detects real changes
test_episode_update_changed:
  severity: "5"
  status: "3"
  owner: "unassigned"
  instruction: "Updated by Ansible integration test"

# Baseline values used to restore the episode after the test run
test_episode_restore:
  severity: "2"
  status: "1"
  owner: "unassigned"
  instruction: "all_instruction"
