---
# Glass table test data
test_glass_table_title: "ansible-test-glass-table"
test_glass_table_updated_description: "Updated by Ansible integration test"

test_glass_table:
  description: "Ansible integration test glass table"
  definition:
    title: "ansible-test-glass-table"
    description: "Ansible integration test glass table"
    defaults:
      dataSources:
        global:
          options:
            queryParameters:
              earliest: "$global_time.earliest$"
              latest: "$global_time.latest$"
            refreshType: delay
            refresh: "$global_refresh_rate$"
    layout:
      options:
        showTitleAndDescription: true
      globalInputs:
        - input_global_trp
        - input_global_refresh_rate
      tabs:
        items:
          - layoutId: layout_1
            label: "Layout 1"
      layoutDefinitions:
        layout_1:
          type: absolute
          options:
            width: 1920
            height: 1080
            backgroundColor: "#FFFFFF"
          structure: []
    dataSources: {}
    visualizations: {}
    inputs:
      input_global_trp:
        options:
          defaultValue: "-60m@m, now"
          token: global_time
        type: input.timerange
        title: Global Time Range
      input_global_refresh_rate:
        options:
          items:
            - value: "60s"
              label: "1 Minute"
            - value: "300s"
              label: "5 Minutes"
          defaultValue: "60s"
          token: global_refresh_rate
        type: input.dropdown
        title: Global Refresh Rate

# ---------- invalid definitions ----------

# Schema violation + referential integrity violation so it fails even without jsonschema
test_glass_table_invalid_schema:
  title: "ansible-test-gt-invalid-schema"
  description: "Glass table with schema and referential integrity violations"
  definition:
    title: "ansible-test-gt-invalid-schema"
    description: "Should fail validation"
    bogus_top_level_key: "not allowed"
    dataSources:
      ds_bad:
        type: "not.a.valid.ds.type"
        options:
          query: "| makeresults"
    visualizations:
      viz_broken:
        type: splunk.singlevalue
        dataSources:
          primary: ds_nonexistent
    inputs: {}
    layout:
      type: absolute

# Referential integrity violation: viz references non-existent data source,
# tab references non-existent layout definition
test_glass_table_invalid_refs:
  title: "ansible-test-gt-invalid-refs"
  description: "Glass table with broken cross-references"
  definition:
    title: "ansible-test-gt-invalid-refs"
    description: "Should fail referential integrity checks"
    dataSources:
      ds_real:
        type: ds.search
        options:
          query: "| makeresults"
    visualizations:
      viz_orphan:
        type: splunk.singlevalue
        dataSources:
          primary: ds_does_not_exist
    inputs: {}
    layout:
      tabs:
        items:
          - layoutId: layout_nope
      layoutDefinitions:
        layout_real:
          type: absolute
          structure: []
